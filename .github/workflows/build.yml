name: Build Blog

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create posts folder
        run: mkdir -p posts

      - name: Generate HTML
        run: |

          for file in posts-md/*.md
          do

            filename=$(basename "$file" .md)

            title=$(head -n 1 "$file" | sed 's/# //')

            date=$(sed -n '2p' "$file")

            body=$(tail -n +4 "$file")

            echo "<!DOCTYPE html>" > posts/$filename.html

            echo "<html lang='zh'>" >> posts/$filename.html

            echo "<head>" >> posts/$filename.html

            echo "<meta charset='UTF-8'>" >> posts/$filename.html

            echo "<title>$title</title>" >> posts/$filename.html

            echo "</head>" >> posts/$filename.html

            echo "<body style='font-family:Arial;max-width:800px;margin:auto;padding:40px;line-height:1.8;background:#f5f5f5'>" >> posts/$filename.html

            echo "<a href='../index.html'>← 返回首页</a>" >> posts/$filename.html

            echo "<h1>$title</h1>" >> posts/$filename.html

            echo "<p>$date</p>" >> posts/$filename.html

            echo "<hr>" >> posts/$filename.html

            echo "<p>$body</p>" >> posts/$filename.html

            echo "</body></html>" >> posts/$filename.html

          done

      - name: Commit files
        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add posts

          git commit -m "generate html" || echo "No changes"

          git push
